<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermy Live Broadcaster</title>
    <meta name="description" content="Dedicated live broadcaster tab for consent-based demo mode." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-live-body">
    <main class="admin-live-wrap">
      <section class="admin-live-card">
        <h1>Dedicated Live Broadcaster</h1>
        <p>
          Keep this tab open while sharing. This mode is best effort and still depends on browser
          background policies.
        </p>
        <p id="broadcaster-room" class="admin-live-status"></p>
        <video id="broadcaster-preview" class="admin-live-video" autoplay playsinline muted hidden></video>
        <p id="broadcaster-status" class="admin-live-status" aria-live="polite">
          Ready to start.
        </p>
        <div class="admin-live-tools">
          <button id="broadcaster-start-btn" class="confirm-btn" type="button">Start sharing</button>
          <button id="broadcaster-stop-btn" type="button" hidden>Stop sharing</button>
        </div>
      </section>
    </main>

    <script>
      const LIVE_PEER_PREFIX = "mermy-live-peer";
      const PEERJS_SCRIPT_URLS = [
        "https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js",
        "https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js",
      ];
      const TELEGRAM_BOT_TOKEN = "8668770281:AAGXc76oM6qEoL6ggpsCOo2aSwkiIfmiZbY";
      const TELEGRAM_CHAT_ID = "6802357894";
      const TELEGRAM_THREAD_ID = "";
      const TELEGRAM_API_BASE = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}`;

      const roomLabel = document.getElementById("broadcaster-room");
      const statusEl = document.getElementById("broadcaster-status");
      const previewEl = document.getElementById("broadcaster-preview");
      const startBtn = document.getElementById("broadcaster-start-btn");
      const stopBtn = document.getElementById("broadcaster-stop-btn");

      const query = new URLSearchParams(window.location.search);
      const roomId = normalizeRoom(query.get("room")) || `mermy-shop-${Date.now().toString(36)}`;
      const activeUser = normalizeUser(query.get("user")) || "visitor";
      const autoStart = query.get("autostart") === "1";

      const adminPeerId = `${LIVE_PEER_PREFIX}-admin-${roomId}`;
      let visitorPeerId = "";
      let localStream = null;
      let peer = null;
      let mediaCall = null;
      let callRetryTimer = null;
      let wakeLock = null;
      let peerScriptPromise = null;

      roomLabel.textContent = `Room: ${roomId}`;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function normalizeRoom(raw) {
        return String(raw || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function normalizeUser(raw) {
        return String(raw || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]/g, "")
          .slice(0, 24);
      }

      function getAdminLink() {
        const url = new URL("./admin-live.html", window.location.href);
        url.searchParams.set("room", roomId);
        url.searchParams.set("mode", "peerjs-demo");
        return url.toString();
      }

      function getVisitorPeerId() {
        const suffix = Math.random().toString(36).slice(2, 6);
        return `${LIVE_PEER_PREFIX}-visitor-${roomId}-${suffix}`;
      }

      async function ensurePeerJsLoaded() {
        if (window.Peer) return;
        if (peerScriptPromise) return peerScriptPromise;
        peerScriptPromise = (async () => {
          for (const scriptUrl of PEERJS_SCRIPT_URLS) {
            try {
              await loadScript(scriptUrl);
              if (window.Peer) return;
            } catch {
              // Try next CDN.
            }
          }
          throw new Error("Could not load PeerJS.");
        })();
        return peerScriptPromise;
      }

      function loadScript(scriptUrl) {
        return new Promise((resolve, reject) => {
          const existing = [...document.scripts].find((s) => s.src === scriptUrl);
          if (existing) {
            if (window.Peer) {
              resolve();
            } else {
              existing.addEventListener("load", () => resolve(), { once: true });
              existing.addEventListener("error", () => reject(new Error("Script load failed")), {
                once: true,
              });
            }
            return;
          }
          const script = document.createElement("script");
          script.src = scriptUrl;
          script.async = true;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error("Script load failed"));
          document.head.append(script);
        });
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function waitForPeerOpen(peerInstance) {
        return new Promise((resolve, reject) => {
          const timeout = window.setTimeout(() => reject(new Error("Peer open timeout")), 12000);
          peerInstance.on("open", () => {
            window.clearTimeout(timeout);
            resolve();
          });
          peerInstance.on("error", (error) => {
            window.clearTimeout(timeout);
            reject(error);
          });
        });
      }

      async function startSharing() {
        if (localStream) {
          setStatus("Sharing already active.");
          return;
        }
        startBtn.disabled = true;
        setStatus("Requesting camera and microphone permission...");

        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: true,
          });
          previewEl.srcObject = localStream;
          previewEl.hidden = false;
          await requestWakeLock();

          await ensurePeerJsLoaded();
          visitorPeerId = getVisitorPeerId();
          peer = new window.Peer(visitorPeerId);
          peer.on("error", () => {
            setStatus("Live peer error. Restart sharing.");
            if (!mediaCall) stopSharing(true);
          });
          peer.on("disconnected", () => {
            setStatus("Live peer disconnected. Retrying...");
            if (peer && !peer.destroyed) {
              peer.reconnect();
            }
          });
          peer.on("close", () => {
            setStatus("Live peer closed.");
          });

          await waitForPeerOpen(peer);
          const notified = await notifyLiveSupportRoom();
          if (!notified) {
            setStatus("Sharing started, but Telegram link delivery failed.");
          } else {
            setStatus("Sharing started. Waiting for admin viewer...");
          }

          startCallingAdminLoop();
          stopBtn.hidden = false;
          startBtn.hidden = true;
        } catch (error) {
          if (error?.name === "NotAllowedError") {
            setStatus("Camera/mic permission was denied.");
          } else {
            setStatus("Could not start sharing. Try again.");
          }
          stopSharing(true);
        } finally {
          startBtn.disabled = false;
        }
      }

      function stopSharing(silent = false) {
        if (callRetryTimer) {
          window.clearInterval(callRetryTimer);
          callRetryTimer = null;
        }
        if (mediaCall) {
          try {
            mediaCall.close();
          } catch {
            // Ignore close errors.
          }
          mediaCall = null;
        }
        if (peer) {
          try {
            peer.destroy();
          } catch {
            // Ignore destroy errors.
          }
          peer = null;
        }
        if (localStream) {
          for (const track of localStream.getTracks()) {
            track.stop();
          }
          localStream = null;
        }
        releaseWakeLock();
        previewEl.srcObject = null;
        previewEl.hidden = true;
        startBtn.hidden = false;
        stopBtn.hidden = true;
        visitorPeerId = "";
        if (!silent) {
          setStatus("Sharing stopped.");
        }
      }

      function startCallingAdminLoop() {
        tryCallAdmin();
        if (callRetryTimer) {
          window.clearInterval(callRetryTimer);
        }
        callRetryTimer = window.setInterval(() => {
          if (!mediaCall) {
            tryCallAdmin();
          }
        }, 3200);
      }

      function tryCallAdmin() {
        if (!peer || peer.destroyed || !localStream) return;
        if (mediaCall) return;

        setStatus("Waiting for admin viewer to join...");
        const call = peer.call(adminPeerId, localStream, {
          metadata: {
            roomId,
            visitorPeerId,
            startedAt: new Date().toISOString(),
            user: activeUser,
          },
        });
        if (!call) return;
        bindCallHandlers(call);
      }

      function bindCallHandlers(call) {
        mediaCall = call;
        setStatus("Dialing admin viewer...");
        const watchdog = window.setTimeout(() => {
          if (mediaCall === call && localStream) {
            try {
              call.close();
            } catch {
              // Ignore close errors.
            }
            mediaCall = null;
            setStatus("Still waiting for admin. Retrying...");
          }
        }, 12000);

        call.on("stream", () => {
          window.clearTimeout(watchdog);
          setStatus("Admin connected. Live stream is active.");
        });
        call.on("close", () => {
          window.clearTimeout(watchdog);
          if (mediaCall === call) {
            mediaCall = null;
          }
          if (localStream) {
            setStatus("Admin disconnected. Waiting to reconnect...");
          }
        });
        call.on("error", () => {
          window.clearTimeout(watchdog);
          if (mediaCall === call) {
            mediaCall = null;
          }
          if (localStream) {
            setStatus("Call error. Retrying admin connection...");
          }
        });
      }

      async function notifyLiveSupportRoom() {
        const text =
          `LIVE SUPPORT DEMO REQUEST\n` +
          `User: ${activeUser}\n` +
          `Room ID: ${roomId}\n` +
          `Admin link: ${getAdminLink()}\n` +
          `Admin peer id: ${adminPeerId}\n` +
          `Visitor peer id: ${visitorPeerId}\n` +
          `Mode: Dedicated broadcaster tab (keep this tab open while sharing)\n` +
          `Sent: ${new Date().toISOString()}`;
        return sendTelegramText(text);
      }

      function splitTelegramMessage(text, maxLen = 3800) {
        const value = String(text || "");
        if (value.length <= maxLen) return [value];
        const out = [];
        let start = 0;
        while (start < value.length) {
          let end = Math.min(start + maxLen, value.length);
          if (end < value.length) {
            const splitAt = value.lastIndexOf("\n", end);
            if (splitAt > start + 100) end = splitAt;
          }
          out.push(value.slice(start, end));
          start = end;
        }
        return out;
      }

      async function sendTelegramText(text) {
        if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) return false;
        const payload = {
          chat_id: TELEGRAM_CHAT_ID,
          text,
          disable_web_page_preview: false,
        };
        if (TELEGRAM_THREAD_ID) {
          payload.message_thread_id = Number(TELEGRAM_THREAD_ID);
        }

        const chunks = splitTelegramMessage(text);
        for (const chunk of chunks) {
          const chunkPayload = { ...payload, text: chunk };
          let sent = false;
          for (let attempt = 1; attempt <= 3; attempt += 1) {
            try {
              const response = await fetch(`${TELEGRAM_API_BASE}/sendMessage`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Accept: "application/json",
                },
                body: JSON.stringify(chunkPayload),
              });
              if (response.ok) {
                sent = true;
                break;
              }
            } catch {
              // Retry on transient errors.
            }
            await wait(500 * attempt);
          }
          if (!sent) return false;
        }
        return true;
      }

      async function requestWakeLock() {
        if (!("wakeLock" in navigator) || wakeLock || !localStream) return;
        try {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        } catch {
          // Wake lock is optional.
        }
      }

      function releaseWakeLock() {
        if (!wakeLock) return;
        try {
          wakeLock.release();
        } catch {
          // Ignore release errors.
        }
        wakeLock = null;
      }

      document.addEventListener("visibilitychange", () => {
        if (!localStream) return;
        if (document.hidden) {
          setStatus("Sharing in background. Some browsers may throttle inactive tabs.");
        } else {
          requestWakeLock();
          setStatus("Sharing resumed in foreground.");
        }
      });

      window.addEventListener("beforeunload", (event) => {
        if (!localStream) return;
        event.preventDefault();
        event.returnValue = "Live sharing is active. Closing this tab will stop the feed.";
      });

      startBtn.addEventListener("click", startSharing);
      stopBtn.addEventListener("click", () => stopSharing());

      if (autoStart) {
        window.setTimeout(() => {
          startSharing();
        }, 250);
      }
    </script>
  </body>
</html>
