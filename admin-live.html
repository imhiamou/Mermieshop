<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermy Live Support Admin</title>
    <meta name="description" content="Admin viewer for consent-based live support sessions." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="admin-live-body">
    <main class="admin-live-wrap">
      <section class="admin-live-card">
        <h1>Live Support Admin Viewer</h1>
        <p>
          Frontend-only demo mode. Open this link in another tab on the same browser/device where
          the visitor accepted camera sharing.
        </p>
        <div class="admin-live-tools">
          <input id="admin-room-input" placeholder="Enter room id..." />
          <button id="admin-join-btn" class="confirm-btn" type="button">Join room</button>
          <button id="admin-leave-btn" type="button" hidden>Leave room</button>
        </div>
        <p id="admin-live-status" class="admin-live-status" aria-live="polite"></p>
        <div class="admin-live-stage">
          <video id="admin-live-video" class="admin-live-video" autoplay playsinline controls></video>
        </div>
      </section>
    </main>

    <script>
      const roomInput = document.getElementById("admin-room-input");
      const joinBtn = document.getElementById("admin-join-btn");
      const leaveBtn = document.getElementById("admin-leave-btn");
      const statusEl = document.getElementById("admin-live-status");
      const videoEl = document.getElementById("admin-live-video");
      const SIGNAL_PREFIX = "mermy-live-demo-";
      let peer = null;
      let signalChannel = null;
      let pendingVisitorCandidates = [];
      let activeRoom = "";

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function getRoomFromQuery() {
        const params = new URLSearchParams(window.location.search);
        return params.get("room") || "";
      }

      function normalizeRoom(rawValue) {
        return String(rawValue || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function postSignal(payload) {
        if (!signalChannel) return;
        try {
          signalChannel.postMessage(payload);
        } catch {
          // Ignore failed post if channel is already closed.
        }
      }

      async function joinRoom() {
        const roomId = normalizeRoom(roomInput.value || getRoomFromQuery());
        if (!roomId) {
          setStatus("Enter a room id first.");
          return;
        }

        if (!window.BroadcastChannel || !window.RTCPeerConnection) {
          setStatus("This browser does not support frontend-only WebRTC demo.");
          return;
        }

        roomInput.value = roomId;
        joinBtn.disabled = true;
        setStatus("Joining demo room...");

        try {
          leaveRoom(true);
          activeRoom = roomId;
          pendingVisitorCandidates = [];
          signalChannel = new BroadcastChannel(`${SIGNAL_PREFIX}${roomId}`);
          signalChannel.onmessage = handleSignalMessage;
          peer = createPeerConnection(roomId);

          postSignal({ type: "admin-ready", roomId });
          setStatus("Waiting for visitor offer...");

          leaveBtn.hidden = false;
        } catch {
          setStatus("Could not join room. Please try again.");
        } finally {
          joinBtn.disabled = false;
        }
      }

      function createPeerConnection(roomId) {
        const pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });
        pc.ontrack = (event) => {
          const [stream] = event.streams;
          if (stream) {
            videoEl.srcObject = stream;
            setStatus("Live feed received.");
          }
        };
        pc.onicecandidate = (event) => {
          if (!event.candidate) return;
          postSignal({
            type: "admin-candidate",
            roomId,
            candidate: event.candidate.toJSON ? event.candidate.toJSON() : event.candidate,
          });
        };
        pc.onconnectionstatechange = () => {
          if (pc.connectionState === "connected") {
            setStatus("Connected to visitor stream.");
          } else if (pc.connectionState === "failed") {
            setStatus("Connection failed. Rejoin room.");
          }
        };
        return pc;
      }

      async function handleSignalMessage(event) {
        const payload = event.data || {};
        if (!activeRoom || payload.roomId !== activeRoom || !peer) return;

        if (payload.type === "visitor-ready") {
          postSignal({ type: "admin-ready", roomId: activeRoom });
          return;
        }

        if (payload.type === "visitor-offer" && payload.sdp) {
          const offer = new RTCSessionDescription({ type: "offer", sdp: payload.sdp });
          if (peer.currentRemoteDescription?.sdp === payload.sdp) {
            return;
          }
          await peer.setRemoteDescription(offer);
          for (const candidate of pendingVisitorCandidates) {
            await peer.addIceCandidate(candidate).catch(() => {});
          }
          pendingVisitorCandidates = [];
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          postSignal({
            type: "admin-answer",
            roomId: activeRoom,
            sdp: answer.sdp,
          });
          setStatus("Answer sent. Waiting for live tracks...");
          return;
        }

        if (payload.type === "visitor-candidate" && payload.candidate) {
          const candidate = new RTCIceCandidate(payload.candidate);
          if (peer.currentRemoteDescription) {
            await peer.addIceCandidate(candidate).catch(() => {});
          } else {
            pendingVisitorCandidates.push(candidate);
          }
        }
      }

      function leaveRoom(isSilent = false) {
        if (signalChannel) {
          signalChannel.close();
          signalChannel = null;
        }
        if (peer) {
          peer.close();
          peer = null;
        }
        activeRoom = "";
        pendingVisitorCandidates = [];
        videoEl.srcObject = null;
        leaveBtn.hidden = true;
        if (!isSilent) {
          setStatus("Left room.");
        }
      }

      joinBtn.addEventListener("click", joinRoom);
      leaveBtn.addEventListener("click", () => leaveRoom());

      const initialRoom = normalizeRoom(getRoomFromQuery());
      if (initialRoom) {
        roomInput.value = initialRoom;
        joinRoom();
      } else {
        setStatus("Waiting for room id.");
      }
    </script>
  </body>
</html>
