<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <meta name="description" content="Login page." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-locked">
    <main class="login-screen">
      <form id="login-form" class="login-card" autocomplete="off">
        <h1>Login</h1>
        <p>Enter username and password.</p>
        <label class="field">
          <span>Username</span>
          <input id="login-username" name="username" required />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="login-password" name="password" type="password" required />
        </label>
        <p id="login-error" class="login-error" aria-live="polite"></p>
        <button class="confirm-btn" type="submit">Continue</button>
      </form>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const userInput = document.getElementById("login-username");
      const passInput = document.getElementById("login-password");
      const error = document.getElementById("login-error");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const username = userInput.value.trim().toLowerCase();
        if (username === "mermy" && passInput.value === "wolf") {
          sessionStorage.setItem("mermy-auth", "ok");
          sessionStorage.setItem("mermy-auth-user", "mermy");
          window.location.href = "./birthday.html";
          return;
        }
        error.textContent = "Invalid username or password.";
      });
    </script>
  </body>
</html>
